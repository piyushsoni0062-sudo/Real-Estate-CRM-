# Production stack for a single VPS (e.g. Hostinger KVM).
#   1. Copy .env.production.example -> .env and fill in the values.
#   2. docker compose -f docker-compose.prod.yml up -d --build
# Caddy obtains HTTPS for ${DOMAIN} automatically (ports 80 + 443 must be open).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-real_estate_crm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-real_estate_crm}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-real_estate_crm}?schema=public
      CORS_ORIGINS: https://${DOMAIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      # First-boot admin (created only when the users table is empty).
      SEED_DEMO_DATA: "false"
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      ADMIN_MOBILE: ${ADMIN_MOBILE:?set ADMIN_MOBILE in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      # Optional Cloudinary CDN (falls back to local disk when empty).
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - api
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      TLS_EMAIL: ${TLS_EMAIL:?set TLS_EMAIL in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
